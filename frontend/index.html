<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>远程服务器日志</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <header class="header">
    <h1>模拟远程服务器日志</h1>
    <button type="button" id="btn-refresh" class="btn">刷新列表</button>
  </header>
  <div class="layout">
    <aside class="sidebar" aria-label="日志文件列表">
      <h2 class="sidebar__title">日志列表</h2>
      <p class="sidebar__hint">带 ⚠️ 且高亮的项为检测到错误/告警特征的日志</p>
      <nav class="log-nav">
        <ul id="log-list" class="log-list" aria-label="选择要查看的日志"></ul>
      </nav>
    </aside>
    <main class="main">
      <p id="status" class="status" role="status"></p>
      <pre id="log-view" class="log-view" aria-live="polite"></pre>
    </main>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
